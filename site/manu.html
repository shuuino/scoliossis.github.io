<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ===== BODY (GREY BACKGROUND) ===== */
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            overflow: hidden;

            font-family: 'Inter', sans-serif;
            color: #e5e5e5;

            background: #1b1b1b; /* flat grey */

            position: relative;
        }

        /* subtle noise overlay (no space look) */
        body::before {
            content: "";
            position: absolute;
            inset: 0;

            background:
                    radial-gradient(circle at 20% 20%, rgba(255,255,255,0.04), transparent 40%),
                    radial-gradient(circle at 80% 80%, rgba(255,255,255,0.03), transparent 45%);

            pointer-events: none;
        }

        /* ===== HUD FRAME (clean grey lines) ===== */
        .hud-frame {
            position: absolute;
            inset: 28px;
            z-index: 1;

            border: 1px solid rgba(255,255,255,0.08);

            pointer-events: none;
        }

        .hud-frame::before,
        .hud-frame::after {
            content: "";
            position: absolute;
            width: 60px;
            height: 60px;

            border: 2px solid rgba(255,255,255,0.15);
        }

        .hud-frame::before {
            top: 0;
            left: 0;
            border-right: none;
            border-bottom: none;
        }

        .hud-frame::after {
            bottom: 0;
            right: 0;
            border-left: none;
            border-top: none;
        }

        /* ===== CONTAINER ===== */
        .container {
            position: relative;
            z-index: 5;

            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ===== CARD (CLEAN GLASS GREY) ===== */
        .card {
            width: 420px;

            text-align: center;

            padding: 40px 34px;

            border-radius: 18px;

            background: rgba(30,30,30,0.75);

            border: 1px solid rgba(255,255,255,0.08);

            backdrop-filter: blur(10px);

            box-shadow:
                    0 10px 40px rgba(0,0,0,0.5);

            position: relative;
        }

        /* top line */
        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;

            width: 100%;
            height: 2px;

            background: linear-gradient(90deg, transparent, #888, transparent);
        }

        /* ===== PROFILE ===== */
        .profile-ring {
            display: inline-block;
            padding: 5px;
            border-radius: 50%;

            background: rgba(255,255,255,0.08);
        }

        .profile-img {
            width: 150px;
            height: 150px;

            border-radius: 50%;
            object-fit: cover;

            border: 2px solid rgba(255,255,255,0.15);
        }

        /* ===== TEXT ===== */
        h1 {
            font-size: 2.8rem;
            font-weight: 800;

            margin-top: 18px;

            color: #f2f2f2;
        }

        .title {
            font-family: 'JetBrains Mono', monospace;

            font-size: 0.85rem;

            letter-spacing: 2px;

            color: #b0b0b0;

            margin: 10px 0 20px;
        }

        .bio {
            color: #cfcfcf;

            line-height: 1.7;

            font-size: 0.95rem;

            margin-bottom: 25px;
        }

        /* ===== BUTTON ===== */
        /* ===== NICE MODERN BUTTON ===== */

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;

            padding: 12px 20px;

            border-radius: 999px; /* fully rounded pill */

            text-decoration: none;

            color: #fff;

            font-weight: 600;
            font-size: 0.95rem;

            background: linear-gradient(135deg, #2a2a2a, #3a3a3a);

            border: 1px solid rgba(255,255,255,0.10);

            box-shadow:
                    0 6px 18px rgba(0,0,0,0.35);

            transition: 0.25s ease;
        }

        .name {
            display: inline-flex;
            align-items: center;
            gap: 12px;

            font-size: 3rem;
            font-weight: 800;

            letter-spacing: -2px;

            text-shadow: 0 0 15px rgba(139,92,246,0.4);
        }

        /* the tag */
        .tag {
            font-size: 0.7rem;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;

            letter-spacing: 2px;
            text-transform: uppercase;

            padding: 6px 10px;

            border-radius: 999px;

            color: #a78bfa;

            background: rgba(124,58,237,0.15);

            border: 1px solid rgba(124,58,237,0.4);

            box-shadow:
                    0 0 15px rgba(124,58,237,0.25);

            backdrop-filter: blur(8px);
        }

        .btn:hover {
            transform: translateY(-2px) scale(1.03);

            background: linear-gradient(135deg, #3a3a3a, #4a4a4a);

            box-shadow:
                    0 10px 25px rgba(0,0,0,0.5);
        }

        /* GitHub icon */
        .icon {
            width: 18px;
            height: 18px;
        }


        /* ===== MARQUEE ===== */
        .marquee {
            position: fixed;
            bottom: 0;
            width: 100%;

            padding: 10px 0;

            background: rgba(20,20,20,0.9);

            border-top: 1px solid rgba(255,255,255,0.08);

            z-index: 10;
        }

        .marquee p {
            white-space: nowrap;

            font-family: 'JetBrains Mono', monospace;

            color: #aaa;

            letter-spacing: 3px;

            animation: marquee 12s linear infinite;
        }

        @keyframes marquee {
            from { transform: translateX(-100%); }
            to { transform: translateX(100vw); }
        }


        /* ===== FLYING SPEAR (CSS ONLY DVD STYLE LOOP) ===== */

        .spear {
            position: fixed;
            top: 0;
            left: 0;

            font-size: 34px;

            z-index: 999;

            pointer-events: none;
            user-select: none;

            filter: drop-shadow(0 0 6px rgba(255,255,255,0.4));

            animation: flyAround 8s linear infinite;
        }

        /* fake "bouncing path" using keyframes */
        @keyframes flyAround {
            0% {
                transform: translate(10vw, 10vh);
            }

            25% {
                transform: translate(80vw, 20vh);
            }

            50% {
                transform: translate(70vw, 80vh);
            }

            75% {
                transform: translate(15vw, 70vh);
            }

            100% {
                transform: translate(10vw, 10vh);
            }
        }
    </style>

<!--3DS compatibility, checking the user agent and if it matches then we redirect to the 3ds version of the file (located in the /3ds/ folder)-->
<script>
(function() {
  var ua = navigator.userAgent;
  if (ua.indexOf('Nintendo 3DS') !== -1) {
    // Map current filename to 3ds/ equivalent
    var path = window.location.pathname;
    var file = path.substring(path.lastIndexOf('/') + 1) || 'index.html';
    if (file === '') file = 'index.html';
    window.location.replace('/3ds/' + file);
  }
})();
</script>
